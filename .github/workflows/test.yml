name: tests

on:
  push:
    branches: [main, "product-v1-step-*"]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        # `--extra dev` aggiunge pytest/ruff. Pandoc e Tesseract NON sono
        # installati: i test che li richiedono sono auto-skippati via
        # marker `requires_pandoc` / `requires_tesseract` (vedi tests/conftest.py).
        run: uv sync --extra dev

      - name: Run pytest
        # `-v` per leggibilità in CI. Niente coverage qui: l'obiettivo è
        # smoke completo, le metriche di copertura le facciamo localmente.
        run: uv run pytest tests/ -v
