# Canned responses per il FakeLLMProvider — coprono l'intera pipeline
# `custodia build {clients,fornitori,commesse,communications}` sul corpus
# `tests/fixtures/finto-drive/` (5 documenti reali).
#
# Generato programmaticamente (vedi storia git). Ancorato a:
