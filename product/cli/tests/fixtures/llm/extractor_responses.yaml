#   - source_path prodotti dal connettore filesystem sul finto-drive
#
# Schema di matching (vedi `custodia_cli/llm/fakes.py`):
#   key = system + "\n" + last_user_content
# Per ogni entry, `match_prefix` è prefisso di key. Il primo match vince
# (ordine di file).
#
# Layout:
#   - 20 entry "categorize": (4 entity_type) × (5 source_path)
#   - 4 entry "extract": una per (entity_type, entity_name) dedotta dal corpus
